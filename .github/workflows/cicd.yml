name: CryptoMarket CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 1. ADIM: Kodun derlenmesi ve test edilmesi (Continuous Integration)
  build-and-test:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x' # Projen .NET 9 olduğu için bu sürümü seçiyoruz

    - name: Restore Dependencies
      run: dotnet restore Identity.API.sln # Çözüm dosyasındaki tüm paketleri indirir

    - name: Build Solution
      run: dotnet build Identity.API.sln --no-restore --configuration Release
      
    # İleride Unit Test eklersen bu yorum satırlarını kaldırabilirsin
    # - name: Run Tests
    #   run: dotnet test --no-build --verbosity normal

  # 2. ADIM: Docker İmajlarının Oluşturulup Yüklenmesi (Continuous Deployment)
  docker-build-and-push:
    name: Build & Push Docker Images
    needs: build-and-test # Bu adımın çalışması için önce 'build-and-test'in başarılı olması şart!
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' 
    
    strategy:
      # Matrix sayesinde aşağıdaki adımlar her bir mikroservis için paralel olarak ayrı ayrı çalıştırılır.
      matrix:
        service: [ 'Identity.API', 'Market.API', 'Portfolio.API', 'Notifications.API', 'API.Gateway' ]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: . # Tüm projenin ana dizini (Shared.Messages gibi ortak kütüphaneler için gerekli)
        file: ./${{ matrix.service }}/Dockerfile # Hangi servisin Dockerfile'ı kullanılacak
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cryptomarket-${{ matrix.service }}:latest
          ${{ secrets.DOCKER_USERNAME }}/cryptomarket-${{ matrix.service }}:${{ github.sha }}
